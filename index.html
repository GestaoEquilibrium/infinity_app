<style>
  /* ═══════════════════════════════════════════════════════════
     INFINITY — Design system monocromático · vidro
     Branco, cinza e preto. Sem cor — hierarquia por luz e peso.
     ═══════════════════════════════════════════════════════════ */
  :root {
    /* Escala de cinzas (única fonte de cor da interface) */
    --g-0:  oklch(1 0 0);        /* branco   */
    --g-1:  oklch(0.975 0 0);
    --g-2:  oklch(0.94 0 0);
    --g-3:  oklch(0.88 0 0);
    --g-4:  oklch(0.78 0 0);
    --g-5:  oklch(0.62 0 0);
    --g-6:  oklch(0.46 0 0);
    --g-7:  oklch(0.32 0 0);
    --g-8:  oklch(0.21 0 0);
    --g-9:  oklch(0.14 0 0);     /* quase preto */

    /* Papéis */
    --bg: var(--g-2);
    --bg-alt: oklch(0 0 0 / 0.04);
    --surface: oklch(1 0 0 / 0.62);          /* vidro claro   */
    --surface-solid: var(--g-0);             /* modais, menus */
    --surface-2: oklch(1 0 0 / 0.45);
    --ink: var(--g-9);
    --ink-soft: var(--g-6);
    --ink-mute: var(--g-5);
    --line: oklch(0 0 0 / 0.09);
    --line-strong: oklch(0 0 0 / 0.16);
    --accent: var(--g-8);                    /* “cor” de marca = grafite */
    --accent-ink: #ffffff;                   /* texto sobre o accent     */

    /* Semântica (entrada/saída · pago/pendente) — versão estrita: cinzas */
    --c-pos: oklch(0.25 0 0);
    --c-pos-soft: oklch(0 0 0 / 0.07);
    --c-neg: oklch(0.5 0 0);
    --c-neg-soft: oklch(0 0 0 / 0.055);
    --c-warn: oklch(0.42 0 0);
    --c-warn-soft: oklch(0 0 0 / 0.06);

    /* Aliases legados (mantêm componentes antigos funcionando) */
    --c-primary: var(--accent);
    --c-primary-soft: oklch(0 0 0 / 0.07);
    --c-secondary: var(--g-6);
    --c-secondary-soft: oklch(0 0 0 / 0.06);
    --c-tertiary: var(--g-5);
    --c-tertiary-soft: oklch(0 0 0 / 0.05);
    --c-danger: var(--c-neg);
    --c-danger-soft: var(--c-neg-soft);
    --c-warning: var(--c-warn);
    --c-violet: var(--g-7);
    --c-violet-soft: oklch(0 0 0 / 0.06);
    --c-pink: var(--g-5);

    /* Vidro */
    --glass-blur: blur(14px) saturate(1.04);
    --glass-border: oklch(1 0 0 / 0.55);
    --glass-inset: inset 0 1px 0 oklch(1 0 0 / 0.7);

    /* Sombras neutras */
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.05), 0 4px 14px oklch(0 0 0 / 0.05);
    --shadow-md: 0 4px 14px oklch(0 0 0 / 0.07), 0 14px 34px oklch(0 0 0 / 0.08);
    --shadow-lg: 0 10px 28px oklch(0 0 0 / 0.12), 0 30px 70px oklch(0 0 0 / 0.16);
    --glow-primary: 0 0 0 1px oklch(0 0 0 / 0.1), 0 10px 30px oklch(0 0 0 / 0.16);

    /* Raios — mais contidos, grid mais “arrumado” */
    --r-lg: 22px;
    --r-md: 16px;
    --r-sm: 12px;
    --r-xs: 9px;

    color-scheme: light;
  }

  /* Variante semântica suave (verde/vermelho dessaturados) — opcional.
     Ative com <body data-semantic="soft">                                 */
  [data-semantic="soft"] {
    --c-pos: oklch(0.52 0.09 155);
    --c-pos-soft: oklch(0.52 0.09 155 / 0.1);
    --c-neg: oklch(0.55 0.12 25);
    --c-neg-soft: oklch(0.55 0.12 25 / 0.09);
    --c-warn: oklch(0.62 0.1 85);
    --c-warn-soft: oklch(0.62 0.1 85 / 0.12);
  }

  [data-theme="dark"] {
    /* Rampa invertida — categorias continuam legíveis sobre superfícies escuras */
    --g-0: oklch(0.15 0 0);
    --g-1: oklch(0.18 0 0);
    --g-2: oklch(0.22 0 0);
    --g-3: oklch(0.3 0 0);
    --g-4: oklch(0.46 0 0);
    --g-5: oklch(0.56 0 0);
    --g-6: oklch(0.66 0 0);
    --g-7: oklch(0.78 0 0);
    --g-8: oklch(0.88 0 0);
    --g-9: oklch(0.95 0 0);

    --bg: oklch(0.145 0 0);
    --bg-alt: oklch(1 0 0 / 0.05);
    --surface: oklch(0.24 0 0 / 0.55);
    --surface-solid: oklch(0.22 0 0);
    --surface-2: oklch(0.3 0 0 / 0.4);
    --ink: oklch(0.97 0 0);
    --ink-soft: oklch(0.74 0 0);
    --ink-mute: oklch(0.58 0 0);
    --line: oklch(1 0 0 / 0.1);
    --line-strong: oklch(1 0 0 / 0.18);
    --accent: oklch(0.95 0 0);
    --accent-ink: oklch(0.16 0 0);

    --c-pos: oklch(0.9 0 0);
    --c-pos-soft: oklch(1 0 0 / 0.09);
    --c-neg: oklch(0.62 0 0);
    --c-neg-soft: oklch(1 0 0 / 0.07);
    --c-warn: oklch(0.75 0 0);
    --c-warn-soft: oklch(1 0 0 / 0.08);

    --c-primary-soft: oklch(1 0 0 / 0.09);
    --c-secondary: oklch(0.68 0 0);
    --c-secondary-soft: oklch(1 0 0 / 0.08);
    --c-tertiary: oklch(0.6 0 0);
    --c-tertiary-soft: oklch(1 0 0 / 0.07);
    --c-violet: oklch(0.8 0 0);
    --c-violet-soft: oklch(1 0 0 / 0.08);
    --c-pink: oklch(0.65 0 0);

    --glass-border: oklch(1 0 0 / 0.12);
    --glass-inset: inset 0 1px 0 oklch(1 0 0 / 0.09);

    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.4), 0 4px 14px oklch(0 0 0 / 0.3);
    --shadow-md: 0 4px 16px oklch(0 0 0 / 0.4), 0 14px 36px oklch(0 0 0 / 0.35);
    --shadow-lg: 0 10px 28px oklch(0 0 0 / 0.5), 0 30px 70px oklch(0 0 0 / 0.5);
    --glow-primary: 0 0 0 1px oklch(1 0 0 / 0.12), 0 10px 30px oklch(0 0 0 / 0.45);
    color-scheme: dark;
  }
  [data-theme="dark"][data-semantic="soft"] {
    --c-pos: oklch(0.72 0.09 155);
    --c-pos-soft: oklch(0.72 0.09 155 / 0.13);
    --c-neg: oklch(0.68 0.12 25);
    --c-neg-soft: oklch(0.68 0.12 25 / 0.12);
    --c-warn: oklch(0.78 0.1 85);
    --c-warn-soft: oklch(0.78 0.1 85 / 0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02";
    transition: background 0.5s ease, color 0.5s ease;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  /* ── Cena de fundo monocromática ─────────────────────────── */
  .bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .bg-scene::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(1100px 700px at 18% -10%, oklch(1 0 0 / 0.9), transparent 60%),
      radial-gradient(900px 620px at 100% 110%, oklch(0 0 0 / 0.1), transparent 55%);
  }
  [data-theme="dark"] .bg-scene::before {
    background:
      radial-gradient(1100px 700px at 18% -10%, oklch(1 0 0 / 0.07), transparent 60%),
      radial-gradient(900px 620px at 100% 110%, oklch(0 0 0 / 0.55), transparent 55%);
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
  }
  /* animação dos blobs só quando o usuário não pediu menos movimento
     e desligada por padrão para não pesar — reative trocando 'none' por 'blobFloat 26s...' */
  .blob.b1 { width: 560px; height: 560px; background: oklch(0 0 0 / 0.07); top: -140px; left: -120px; }
  .blob.b2 { width: 480px; height: 480px; background: oklch(0 0 0 / 0.055); bottom: -160px; right: -80px; animation-delay: -8s; animation-duration: 30s; }
  .blob.b3 { width: 380px; height: 380px; background: oklch(1 0 0 / 0.5); top: 38%; left: 42%; animation-delay: -14s; animation-duration: 34s; }
  [data-theme="dark"] .blob.b1 { background: oklch(1 0 0 / 0.05); }
  [data-theme="dark"] .blob.b2 { background: oklch(1 0 0 / 0.04); }
  [data-theme="dark"] .blob.b3 { background: oklch(1 0 0 / 0.06); }

  /* ── Tema COLORIDO: blobs ganham cor (degradê orgânico via blur) ── */
  [data-tema="colorido"] .blob.b1 { background: oklch(0.62 0.19 250 / 0.38); }
  [data-tema="colorido"] .blob.b2 { background: oklch(0.56 0.21 300 / 0.34); }
  [data-tema="colorido"] .blob.b3 { background: oklch(0.60 0.20 330 / 0.30); }
  [data-tema="colorido"] .bg-scene::before {
    background:
      radial-gradient(1100px 700px at 18% -10%, oklch(0.7 0.16 250 / 0.28), transparent 60%),
      radial-gradient(900px 620px at 100% 110%, oklch(0.62 0.2 300 / 0.26), transparent 55%);
  }
  /* botões primários/itens ativos com leve degradê no colorido */
  [data-tema="colorido"] .glass { border-color: oklch(0.6 0.12 265 / 0.22); }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(60px, -40px) scale(1.07); }
    66% { transform: translate(-40px, 50px) scale(0.95); }
  }

  /* Grade sutil */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 15%, transparent 72%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 15%, transparent 72%);
    opacity: 0.3;
  }

  #root { position: relative; z-index: 1; height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* Vidro reutilizável */
  .glass {
    background: var(--surface);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-sm), var(--glass-inset);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); background-clip: padding-box; }

  /* Focus */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-xs); }

  /* Animações utilitárias — só transform, nunca opacity de entrada */
  @keyframes slideUp { from { transform: translateY(16px); } to { transform: none; } }
  @keyframes fadeIn { from { transform: translateY(4px); } to { transform: none; } }
  @keyframes popIn { from { transform: scale(0.96); } to { transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 currentColor; } 100% { box-shadow: 0 0 0 12px transparent; } }

  .anim-slide { animation: slideUp 0.6s cubic-bezier(.22,1,.36,1) both; }
  .anim-fade { animation: fadeIn 0.5s ease both; }
  .anim-pop { animation: popIn 0.5s cubic-bezier(.22,1,.36,1) both; }
</style>
